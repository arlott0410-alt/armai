# ArmAI API - Cloudflare Workers
# Owner deploys manually; bindings and secrets configured in Cloudflare Dashboard.

name = "armai"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# KV for system_settings cache (ลดการอ่าน Supabase).
# สร้าง namespace ชื่อ "ARMAI_SETTINGS" ก่อน deploy:
#   cd apps/api && npx wrangler kv:namespace create "ARMAI_SETTINGS"
# แล้วเอา id ที่แสดงมาแทนที่ค่าด้านล่าง (แทน REPLACE_WITH_YOUR_KV_NAMESPACE_ID)
[[kv_namespaces]]
binding = "SETTINGS_KV"
id = "9fb408e8585848a986710d1359988517"

# R2 bucket for slip images (name must be 3–63 chars, lowercase, numbers, hyphens only)
# Create a bucket with this name in Dashboard → R2 if it does not exist
[[r2_buckets]]
binding = "SLIP_BUCKET"
bucket_name = "armai-slips"

# Channel media (WhatsApp/Facebook images, documents)
# Create bucket "armai-channel-media" in Dashboard → R2 if it does not exist
[[r2_buckets]]
binding = "CHANNEL_MEDIA_BUCKET"
bucket_name = "armai-channel-media"

# Secrets (set in Dashboard or wrangler secret put):
# SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
# GEMINI_API_KEY
# FACEBOOK_APP_SECRET (for webhook signature verification and token exchange)
# FACEBOOK_APP_ID (for Facebook connect flow token exchange)
# FACEBOOK_VERIFY_TOKEN (optional; hub.verify_token for Messenger webhook GET verification)
# META_APP_ID, META_APP_SECRET (for WhatsApp OAuth connect; can be same as FACEBOOK_APP_ID/SECRET)
# WHATSAPP_VERIFY_TOKEN (hub.verify_token for WhatsApp webhook GET verification)

[vars]
# Non-secret config; override in Dashboard for production
ENVIRONMENT = "production"
